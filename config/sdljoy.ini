; Gamepads of Valhalla - Rune Classic PS2-style gamepad profile
; sdljoy.ini - controller profile for the winmm shim.
; Place next to winmm.dll in the Rune Classic\System\ folder.
; Purpose: map a physical controller input -> Joy index (read by User.ini).

[general]
controller_index = 0       ; which gamepad (0 = first)
poll_background  = 1        ; keep reading input even when the window is unfocused

[sticks]
left_deadzone     = 6000    ; left stick dead zone (0..32767)
right_deadzone    = 6000
invert_left_y     = 0
invert_right_y    = 1     ; THE look-inversion knob. Flip 0<->1 if vertical look is reversed.
right_sensitivity = 75       ; right stick sensitivity, % (max 100). Keep Rune.ini ScaleRUV=1000 and tune here.
                             ; This is the single sensitivity knob of the pack
                             ; (no need to touch Rune.ini / ScaleRUV).

[triggers]
mode       = buttons         ; triggers as buttons (otherwise they can't be bound)
threshold  = 8000
left_button  = 7             ; LT -> Joy7
right_button = 8             ; RT -> Joy8

[buttons]
a            = 1             ; A  -> Joy1
b            = 2             ; B  -> Joy2
x            = 3             ; X  -> Joy3
y            = 4             ; Y  -> Joy4
leftshoulder  = 5            ; LB -> Joy5
rightshoulder = 6            ; RB -> Joy6
back         = 9             ; Back  -> Joy9
start        = 10            ; Start -> Joy10
leftstick    = 11            ; L3 -> Joy11
rightstick   = 12            ; R3 -> Joy12
dpleft       = 0             ; D-pad goes through POV (see JoyPov* in User.ini)
dpright      = 0
dpup         = 0
dpdown       = 0
guide        = 0

[axes]
left_x  = X                  ; left stick  -> JoyX (strafe)
left_y  = Y                  ; left stick  -> JoyY (forward/back)
right_x = R                  ; right stick -> JoyR (turn)
right_y = U                  ; right stick -> JoyU (look)
